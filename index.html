<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <link rel="icon" type="image/png" sizes="32x32" href="">
	<link rel="icon" type="image/png" sizes="16x16" href="">

    <link rel="stylesheet" href="pag_style.css">
    <title>Login Page</title>
</head>
<body>
    <header>
        <h1>Login</h1>
    </header>

    <section class="login-section">
        <form>
            <h1 class="titulo-form">Faça seu login</h1>
            
            <div class="input-box">
                <input type="email" placeholder="Usuário">
                <img class="icon" src="pictures/user.png" alt="Ícone de usuário">
            </div>
            
            <div class="input-box">
                <input type="password" placeholder="Senha">
                <img class="icon" src="pictures/password.png" alt="Ícone de senha">
            </div>
            
            <div class="remember-forgot">
                <label>
                    <input type="checkbox">Lembrar-me</input>
                </label>
            
                <a href="###" target="blank" >Esqueceu a senha?</a>
            </div>
            
            <button class="Login" type="submit">Entrar</button>
        </form>
    </section>

    <footer>
        <p>Criando código, arte e ideias, à base de café.☕​😁​👍​<br>
            Portfólio de Desenvolvimento Front-End.<br>
            Todos os direitos reservados<br>
            © 2026 Miguel Dev
        </p>
    </footer>

    
    <script src="pag_script.js"></script>
</body>
</html>
